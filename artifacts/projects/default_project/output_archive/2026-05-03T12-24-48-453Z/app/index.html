<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيستم خدمة عملاء - نموذج أولي</title>
    <style>
        body { font-family: Arial, sans-serif; direction: rtl; background-color: #f9f9f9; margin: 0; padding: 0; }
        header { background-color: #004aad; color: white; padding: 1rem; text-align: center; }
        main { padding: 1rem; max-width: 900px; margin: auto; }
        h1, h2 { margin-top: 0; }
        section { background: white; padding: 1rem; margin-bottom: 1rem; border-radius: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 0.5rem; }
        input, select, textarea { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #004aad; color: white; border: none; padding: 0.75rem 1.5rem; margin-top: 1rem; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #00337a; }
        .ticket-list { margin-top: 1rem; }
        .ticket { border-bottom: 1px solid #ddd; padding: 0.5rem 0; }
        .ticket:last-child { border-bottom: none; }
        .role-select { margin-bottom: 1rem; }
        .channel-badge { display: inline-block; background-color: #004aad; color: white; padding: 0.2rem 0.5rem; border-radius: 3px; margin-left: 0.3rem; font-size: 0.8rem; }
        footer { text-align: center; font-size: 0.8rem; color: #666; margin-top: 2rem; padding-bottom: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>سيستم خدمة عملاء - نموذج أولي</h1>
    </header>
    <main>
        <section>
            <h2>تسجيل الدخول</h2>
            <label for="role">اختر دور المستخدم:</label>
            <select id="role" class="role-select">
                <option value="customer">العميل</option>
                <option value="agent">ممثلي خدمة العملاء</option>
                <option value="supervisor">المشرفين</option>
            </select>
        </section>
        <section id="ticket-section" style="display:none;">
            <h2>إدارة التذاكر</h2>
            <form id="ticket-form">
                <label for="channel">القناة:</label>
                <select id="channel" required>
                    <option value="الهاتف">الهاتف</option>
                    <option value="البريد الإلكتروني">البريد الإلكتروني</option>
                    <option value="الدردشة الحية">الدردشة الحية</option>
                    <option value="وسائل التواصل الاجتماعي">وسائل التواصل الاجتماعي</option>
                </select>
                <label for="subject">موضوع التذكرة:</label>
                <input type="text" id="subject" required />
                <label for="description">الوصف:</label>
                <textarea id="description" rows="4" required></textarea>
                <button type="submit">إنشاء تذكرة جديدة</button>
            </form>
            <div class="ticket-list" id="ticket-list">
                <h3>التذاكر الحالية</h3>
                <div id="tickets-container"></div>
            </div>
        </section>
        <section id="auto-reply-section" style="display:none;">
            <h2>الرد الآلي</h2>
            <p>عند إنشاء تذكرة جديدة، سيتم إرسال رد آلي تلقائيًا.</p>
        </section>
        <section id="performance-report-section" style="display:none;">
            <h2>تقارير الأداء</h2>
            <p>عدد التذاكر الحالية: <span id="ticket-count">0</span></p>
            <p>عدد التذاكر المفتوحة: <span id="open-ticket-count">0</span></p>
            <p>عدد التذاكر المغلقة: <span id="closed-ticket-count">0</span></p>
        </section>
    </main>
    <footer>
        <p>هذا النظام هو نموذج أولي بسيط لنظام خدمة عملاء متعدد القنوات.</p>
    </footer>
    <script>
        (function() {
            const roleSelect = document.getElementById('role');
            const ticketSection = document.getElementById('ticket-section');
            const autoReplySection = document.getElementById('auto-reply-section');
            const performanceReportSection = document.getElementById('performance-report-section');
            const ticketForm = document.getElementById('ticket-form');
            const ticketsContainer = document.getElementById('tickets-container');
            const ticketCountSpan = document.getElementById('ticket-count');
            const openTicketCountSpan = document.getElementById('open-ticket-count');
            const closedTicketCountSpan = document.getElementById('closed-ticket-count');

            let tickets = [];

            function updateUIByRole(role) {
                if (role === 'customer') {
                    ticketSection.style.display = 'block';
                    autoReplySection.style.display = 'block';
                    performanceReportSection.style.display = 'none';
                } else if (role === 'agent') {
                    ticketSection.style.display = 'block';
                    autoReplySection.style.display = 'block';
                    performanceReportSection.style.display = 'block';
                } else if (role === 'supervisor') {
                    ticketSection.style.display = 'block';
                    autoReplySection.style.display = 'block';
                    performanceReportSection.style.display = 'block';
                } else {
                    ticketSection.style.display = 'none';
                    autoReplySection.style.display = 'none';
                    performanceReportSection.style.display = 'none';
                }
            }

            function renderTickets() {
                ticketsContainer.innerHTML = '';
                tickets.forEach((ticket, index) => {
                    const div = document.createElement('div');
                    div.className = 'ticket';
                    div.innerHTML = `
                        <strong>موضوع:</strong> ${ticket.subject} <span class="channel-badge">${ticket.channel}</span><br>
                        <strong>الوصف:</strong> ${ticket.description}<br>
                        <strong>الحالة:</strong> ${ticket.status}<br>
                        <button data-index="${index}" class="toggle-status-btn">تغيير الحالة</button>
                    `;
                    ticketsContainer.appendChild(div);
                });
                updatePerformanceReport();
            }

            function updatePerformanceReport() {
                ticketCountSpan.textContent = tickets.length;
                const openCount = tickets.filter(t => t.status === 'مفتوحة').length;
                const closedCount = tickets.filter(t => t.status === 'مغلقة').length;
                openTicketCountSpan.textContent = openCount;
                closedTicketCountSpan.textContent = closedCount;
            }

            ticketForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const channel = document.getElementById('channel').value;
                const subject = document.getElementById('subject').value.trim();
                const description = document.getElementById('description').value.trim();

                if (!subject || !description) {
                    alert('يرجى ملء جميع الحقول.');
                    return;
                }

                const newTicket = {
                    channel: channel,
                    subject: subject,
                    description: description,
                    status: 'مفتوحة'
                };

                tickets.push(newTicket);
                renderTickets();

                alert('تم إنشاء التذكرة بنجاح. سيتم الرد عليك آليًا قريبًا.');

                ticketForm.reset();
            });

            ticketsContainer.addEventListener('click', function(e) {
                if (e.target.classList.contains('toggle-status-btn')) {
                    const index = e.target.getAttribute('data-index');
                    if (tickets[index].status === 'مفتوحة') {
                        tickets[index].status = 'مغلقة';
                    } else {
                        tickets[index].status = 'مفتوحة';
                    }
                    renderTickets();
                }
            });

            roleSelect.addEventListener('change', function() {
                updateUIByRole(roleSelect.value);
            });

            // Initialize UI
            updateUIByRole(roleSelect.value);
            renderTickets();
        })();
    </script>
</body>
</html>
